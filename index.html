<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TechNova</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
background:#0f172a;
color:white;
font-family:'Segoe UI',sans-serif;
transition:0.4s;
}
.navbar{
backdrop-filter:blur(15px);
background:rgba(15,23,42,0.85)!important;
}
.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0a2540,#1f6feb);
text-align:center;
}
.card{
border-radius:20px;
transition:0.4s;
}
.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}
#cartDrawer{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:#111;
padding:20px;
transition:0.4s;
overflow:auto;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
<div class="container">
<a class="navbar-brand" href="#"><i class="bi bi-cpu-fill"></i> TechNova</a>

<div class="ms-auto">
<a class="nav-link d-inline text-white" href="compare.html">Compare</a>
<a class="nav-link d-inline text-white" href="#" onclick="openCart()">Cart (<span id="cartCount">0</span>)</a>
<a class="nav-link d-inline text-white" href="login.html">Login</a>
<a class="nav-link d-inline text-white" href="settings.html">Settings</a>
</div>
</div>
</nav>

<section class="hero">
<h1 class="display-3 fw-bold">Innovation. Simplified.</h1>
<p class="lead">Premium technology without premium prices.</p>
</section>

<div class="container my-5">

<div class="row g-4">

<div class="col-md-4">
<div class="card p-4 bg-dark text-white">
<h4>Smartphone X</h4>
<p>$699</p>
<button class="btn btn-primary" onclick="addToCart('Smartphone X',699)">Add to Cart</button>
</div>
</div>

<div class="col-md-4">
<div class="card p-4 bg-dark text-white">
<h4>Laptop Pro</h4>
<p>$1299</p>
<button class="btn btn-primary" onclick="addToCart('Laptop Pro',1299)">Add to Cart</button>
</div>
</div>

<div class="col-md-4">
<div class="card p-4 bg-dark text-white">
<h4>Headphones</h4>
<p>$199</p>
<button class="btn btn-primary" onclick="addToCart('Headphones',199)">Add to Cart</button>
</div>
</div>

</div>
</div>

<div id="cartDrawer">
<h4>Your Cart</h4>
<ul id="cartList"></ul>
<button class="btn btn-danger" onclick="clearCart()">Clear Cart</button>
<button class="btn btn-secondary mt-2" onclick="closeCart()">Close</button>
</div>

<script>
let cart=JSON.parse(localStorage.getItem("cart"))||[];

function addToCart(name,price){
cart.push({name,price});
localStorage.setItem("cart",JSON.stringify(cart));
updateCart();
}

function updateCart(){
document.getElementById("cartCount").innerText=cart.length;
let list=document.getElementById("cartList");
list.innerHTML="";
cart.forEach(item=>{
let li=document.createElement("li");
li.innerText=item.name+" - $"+item.price;
list.appendChild(li);
});
}

function clearCart(){
localStorage.removeItem("cart");
cart=[];
updateCart();
}

function openCart(){
document.getElementById("cartDrawer").style.right="0";
}

function closeCart(){
document.getElementById("cartDrawer").style.right="-400px";
}

updateCart();
</script>

</body>
</html>
