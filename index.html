<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TechNova | Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{transition:0.4s;background:#0f172a;color:white;}
.light-mode{background:#f8f9fa;color:black;}
.navbar{backdrop-filter:blur(10px);}
.card{border-radius:20px;transition:0.4s;}
.card:hover{transform:scale(1.05);}
.hero{padding:100px 20px;background:linear-gradient(135deg,#0a2540,#1f6feb);text-align:center;}
.fade-out{opacity:0;transition:0.5s;}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="#"><i class="bi bi-cpu-fill"></i> TechNova</a>
<div class="ms-auto">
<a class="nav-link d-inline text-white" href="compare.html">Compare</a>
<a class="nav-link d-inline text-white" href="cart.html">Cart (<span id="cartCount">0</span>)</a>
<a class="nav-link d-inline text-white" href="login.html">Login</a>
<a class="nav-link d-inline text-white" href="settings.html">Settings</a>
</div>
</div>
</nav>

<section class="hero">
<h1>Affordable Future Tech</h1>
<p>Shop smarter. Compare better.</p>
</section>

<div class="container my-5">
<input type="text" id="search" class="form-control mb-4" placeholder="Search products..." onkeyup="filterProducts()">

<div class="row g-4">

<div class="col-md-4">
<div class="card p-3">
<h5>Smartphone X</h5>
<p>$699</p>
<button class="btn btn-primary" onclick="addToCart('Smartphone X',699)">Add to Cart</button>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Laptop Pro</h5>
<p>$1299</p>
<button class="btn btn-primary" onclick="addToCart('Laptop Pro',1299)">Add to Cart</button>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Headphones</h5>
<p>$199</p>
<button class="btn btn-primary" onclick="addToCart('Headphones',199)">Add to Cart</button>
</div>
</div>

</div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name,price){
cart.push({name,price});
localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
alert("Added to cart!");
}

function updateCartCount(){
document.getElementById("cartCount").innerText=cart.length;
}

function filterProducts(){
let input=document.getElementById("search").value.toLowerCase();
document.querySelectorAll(".card").forEach(card=>{
card.style.display=card.innerText.toLowerCase().includes(input)?"block":"none";
});
}

updateCartCount();
</script>

</body>
</html>
