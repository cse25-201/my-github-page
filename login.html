<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4 text-dark" style="width:300px;">
<h4>Login</h4>
<input type="email" class="form-control mb-2" placeholder="Email">
<input type="password" class="form-control mb-2" placeholder="Password">
<button class="btn btn-primary w-100" onclick="login()">Login</button>
</div>

<script>
function login(){
let email=document.querySelector("input[type=email]").value;
let pass=document.querySelector("input[type=password]").value;

if(email==="admin@technova.com" && pass==="admin123"){
localStorage.setItem("user","admin");
window.location="dashboard.html";
}else{
alert("Wrong credentials");
}
}
</script>

</body>
</html>
